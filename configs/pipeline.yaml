company:
  id: gainr
  adapter: gainr
  artifact_prefix: ads

paths:
  input_dir: .
  data_dir: data
  output_root: output
  intermediate_dir: output/intermediate
  final_dir: output/final
  reports_dir: output/reports
  diagnostics_dir: output/diagnostics

source_sync:
  staging_dir: output/source_sync/latest
  backup_dir: output/source_sync/backups
  backup_retention: 1
  tables:
    - name: ads
      db_table: ads
      filename: ads.csv
      primary_key: id
    - name: ads_attributes
      db_table: ads_attributes
      filename: ads_attributes.csv
      primary_key: id
    - name: categories
      db_table: categories
      filename: categories.csv
      primary_key: id
    - name: sub_categories
      db_table: sub_categories
      filename: sub_categories.csv
      primary_key: id
    - name: attributes
      db_table: attributes
      filename: attributes.csv
      primary_key: id
    - name: attribute_values
      db_table: attribute_values
      filename: attribute_values.csv
      primary_key: id
    - name: states
      db_table: states
      filename: states.csv
      primary_key: id
    - name: location
      db_table: location
      filename: location.csv
      primary_key: id
    - name: locations
      db_table: locations
      filename: locations.csv
      primary_key: id

mysql:
  host_env: MYSQL_HOST
  port_env: MYSQL_PORT
  database: hvkbynbu_wwwdevsl_slowr_test
  user_env: MYSQL_USER
  password_env: MYSQL_PASSWORD
  phpmyadmin_url: https://testphpmyadmin.gainr.in
  phpmyadmin_database_url: https://testphpmyadmin.gainr.in/index.php?route=/database/structure&db=hvkbynbu_wwwdevsl_slowr_test
  note: "Use direct DB credentials for automated extraction; phpMyAdmin is a browser UI/reference only."

postgres:
  host_env: POSTGRES_HOST
  port_env: POSTGRES_PORT
  database_env: POSTGRES_DATABASE
  user_env: POSTGRES_USER
  password_env: POSTGRES_PASSWORD
  final_table: ads_search_ready

search_ready:
  types:
    integer:
      - id
      - main_category_id
      - subcategory_id
      - state_id
      - city_id
      - locality_id
    float:
      - rental_fee
      - city_latitude
      - city_longitude
      - locality_latitude
      - locality_longitude
    datetime:
      - created_at
      - updated_at
  columns:
    - company_id
    - id
    - title
    - description
    - rental_duration
    - rental_fee
    - status
    - created_at
    - updated_at
    - main_category_id
    - main_category_name
    - subcategory_id
    - subcategory_name
    - state_id
    - state_name
    - city_id
    - city_name
    - locality_id
    - locality_name
    - locality_district
    - locality_pincode
    - city_latitude
    - city_longitude
    - locality_latitude
    - locality_longitude
    - attributes_text
    - attribute_values_text
    - attribute_keywords_text
    - attributes_json
    - attribute_ids_json
    - attribute_value_ids_json
    - category_join_status
    - location_join_status
    - attribute_mapping_status
    - city_locality_consistency_status
    - embedding_content
    - bm25_content
    - extras_json

embedding:
  source_columns:
    - title
    - description
    - meta_title
    - meta_description
    - keywords
    - custom_cat_value
    - main_category_name
    - main_category_meta_title
    - main_category_meta_description
    - subcategory_name
    - subcategory_meta_title
    - subcategory_meta_description
    - rental_duration
    - state_name
    - city_name
    - locality_name
    - locality_district
    - attributes_text
    - attribute_values_text
    - attribute_keywords_text
    - meta_keywords
    - main_category_meta_keywords
    - subcategory_meta_keywords

bm25:
  source_columns:
    - id
    - title
    - keywords
    - meta_keywords
    - custom_cat_value
    - main_category_name
    - main_category_meta_keywords
    - main_category_ad_title_label
    - main_category_placeholder
    - subcategory_name
    - subcategory_meta_keywords
    - rental_duration
    - main_category_rental_duration
    - rental_fee
    - state_name
    - city_name
    - locality_name
    - locality_district
    - attributes_text
    - attribute_values_text
    - attribute_keywords_text
